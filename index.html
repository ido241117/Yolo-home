<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yolo Home - Smarthome Dashboard</title>
    <!-- Tự động chuyển hướng sang trang dashboard chính sau 0 giấy -->
    <meta http-equiv="refresh" content="0; url=mockup/01 dashboard_tong_quan.html" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #020617;
            color: #f8fafc;
        }

        .loader-container {
            text-align: center;
            padding: 40px;
            background: #0f172a;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5);
            border: 1px solid #1e293b;
            max-width: 400px;
            width: 90%;
        }

        .spinner {
            border: 4px solid #1e293b;
            border-top-color: #3b82f6;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        h2 {
            font-size: 1.25rem;
            margin-bottom: 12px;
            font-weight: 500;
        }

        p {
            font-size: 0.875rem;
            color: #94a3b8;
        }

        a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 500;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="loader-container">
        <div class="spinner"></div>
        <h2>Đang khởi động Yolo:Home...</h2>
        <p>Nếu hệ thống không tự động chuyển trang, vui lòng <a href="mockup/01 dashboard_tong_quan.html">nhấn vào
                đây</a>.</p>
    </div>
</body>

</html>
